<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Karimjee Group · AI Tool Vetting & Approval</title>
<style>
  :root{
    --brand:#1d3c6f; --brand-dark:#102849; --brand-light:#e7ecf4;
    --emblem:#184377; --emblem-light:#dfe6f1;
    --accent:#184377; --ok:#1d3c6f; --okbg:#e7ecf4;
    --bad:#5c6678; --badbg:#eef1f5; --warn:#184377; --warnbg:#dfe6f1;
    --ink:#1c2230; --muted:#5c6678; --line:#dde3ec; --bg:#f4f6fa; --card:#fff;
    --radius:12px; --shadow:0 1px 3px rgba(20,43,81,.08),0 8px 24px rgba(20,43,81,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);font-size:14.5px;line-height:1.5}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
  a{color:var(--brand)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-weight:600;font-size:14px}
  input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:9px 11px;
    border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-light)}
  textarea{resize:vertical;min-height:64px}
  label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
  .btn-primary{background:var(--brand);color:#fff;padding:10px 18px}
  .btn-primary:hover{background:var(--brand-dark)}
  .btn-ghost{background:#fff;color:var(--brand);border:1px solid var(--line);padding:8px 14px}
  .btn-ghost:hover{border-color:var(--brand)}
  .btn-ok{background:var(--ok);color:#fff;padding:8px 14px}
  .btn-bad{background:var(--bad);color:#fff;padding:8px 14px}
  .btn-sm{padding:6px 12px;font-size:13px}
  .hidden{display:none!important}

  /* ---- Login ---- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);padding:20px}
  .login-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);
    width:100%;max-width:420px;padding:38px 34px}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo .mark{width:42px;height:42px;border-radius:9px;background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;letter-spacing:-1px}
  .logo .name{font-size:18px;font-weight:750;color:var(--brand);line-height:1.1}
  .logo .name small{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em}
  .login-sub{color:var(--muted);font-size:13px;margin:14px 0 22px}
  .field{margin-bottom:14px}
  .msg{padding:10px 12px;border-radius:8px;font-size:13px;margin:6px 0 14px}
  .msg.err{background:var(--badbg);color:var(--bad)}
  .msg.ok{background:var(--okbg);color:var(--ok)}
  .toggle-link{text-align:center;font-size:13px;margin-top:16px;color:var(--muted)}
  .toggle-link a{cursor:pointer;font-weight:600}

  /* ---- App shell ---- */
  header.bar{background:var(--brand);color:#fff;padding:0 22px;display:flex;align-items:center;
    justify-content:space-between;height:58px;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
  .bar .logo .name,.bar .logo .name small{color:#fff}
  .bar .mark{background:#fff;color:var(--brand)}
  .who{display:flex;align-items:center;gap:14px;font-size:13px}
  .role-chip{background:rgba(255,255,255,.16);padding:4px 11px;border-radius:20px;font-weight:600;font-size:12px}
  .bar button{background:rgba(255,255,255,.14);color:#fff;padding:7px 13px}
  .bar button:hover{background:rgba(255,255,255,.26)}

  nav.tabs{background:#fff;border-bottom:1px solid var(--line);padding:0 22px;display:flex;gap:4px;
    position:sticky;top:58px;z-index:19;overflow-x:auto}
  nav.tabs button{background:none;color:var(--muted);padding:14px 16px;border-bottom:3px solid transparent;
    border-radius:0;white-space:nowrap}
  nav.tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
  nav.tabs button .badge{background:var(--accent);color:#fff;border-radius:20px;padding:1px 8px;
    font-size:11px;margin-left:6px;font-weight:700}

  main{max-width:1080px;margin:0 auto;padding:26px 22px 60px}
  .page-head{margin-bottom:18px}
  .page-head h2{font-size:22px;color:var(--brand)}
  .page-head p{color:var(--muted);margin:4px 0 0;font-size:13.5px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:18px}
  .card .card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;
    justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .card .card-b{padding:18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  @media(max-width:680px){.grid2,.grid3{grid-template-columns:1fr}}
  .full{grid-column:1/-1}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chk{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;
    padding:7px 11px;font-size:13px;cursor:pointer;background:#fff}
  .chk input{width:auto}
  .chk.on{border-color:var(--brand);background:var(--brand-light)}

  .tool-block{border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;position:relative;background:#fcfdff}
  .tool-block .rm{position:absolute;top:10px;right:10px;background:var(--badbg);color:var(--bad);
    width:26px;height:26px;border-radius:6px;font-weight:700}
  .tool-num{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}

  /* status badges */
  .b{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;letter-spacing:.02em}
  .b.it{background:var(--brand-light);color:var(--brand)}
  .b.leg{background:var(--emblem-light);color:var(--emblem)}
  .b.coo{background:var(--brand);color:#fff}
  .b.ap{background:var(--brand);color:#fff}
  .b.rj{background:var(--badbg);color:var(--bad);border:1px solid #cdd3dd}
  .b.low{background:var(--badbg);color:var(--bad)}
  .b.medium{background:var(--emblem-light);color:var(--emblem)}
  .b.high{background:var(--brand);color:#fff}

  /* pipeline */
  .pipe{display:flex;align-items:center;gap:0;margin:4px 0}
  .pipe .step{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--muted)}
  .pipe .dot{width:22px;height:22px;border-radius:50%;background:#e5e9f0;color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .pipe .dot.done{background:var(--brand);color:#fff}
  .pipe .dot.cur{background:var(--emblem);color:#fff;box-shadow:0 0 0 4px var(--emblem-light)}
  .pipe .dot.rej{background:var(--bad);color:#fff}
  .pipe .line{width:34px;height:2px;background:var(--line)}
  .pipe .line.done{background:var(--brand)}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  tr:last-child td{border-bottom:none}
  .meta{color:var(--muted);font-size:12.5px}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:4px 14px;font-size:13px;margin-top:8px}
  .kv .k{color:var(--muted);font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
  .reason-box{margin-top:10px}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .reason-note{background:#f7f8fb;border-left:3px solid var(--line);padding:8px 12px;margin-top:8px;
    font-size:12.5px;border-radius:0 6px 6px 0}
  .reason-note.rj{border-left-color:var(--bad)}
  .reason-note.ap{border-left-color:var(--ok)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:50;font-size:13.5px;opacity:0;
    transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .stat{flex:1;min-width:130px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:750;color:var(--brand)}
  .stat .l{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}

  /* ---- Logo lockups ---- */
  .login-logo img{display:block;width:240px;max-width:78%;margin:0 auto 10px}
  .login-title{text-align:center;letter-spacing:.2em;font-size:11.5px;color:var(--accent);font-weight:700;margin:0 0 4px}
  .bar-logo{display:flex;align-items:center;gap:14px}
  .bar-logo img{height:40px;display:block;object-fit:contain}
  .bar-sub{font-size:12px;letter-spacing:.18em;color:rgba(255,255,255,.72);font-weight:700;border-left:1px solid rgba(255,255,255,.32);padding-left:14px}
  @media(max-width:600px){.bar-sub{display:none}}
</style>
</head>

function pipeline(t){
  // steps: IT, Legal, COO
  const order=["it_review","legal_review","coo_review"];
  let html='<div class="pipe">';
  const steps=[["IT","it"],["Legal","leg"],["COO","coo"]];
  const idx=order.indexOf(t.stage);
  steps.forEach((s,i)=>{
    let cls="dot";
    if(t.stage==="approved"){cls+=" done";}
    else if(t.stage==="rejected"){
      // mark which stage rejected
      const rejAt = t.it_status==="declined"?0 : t.legal_status==="declined"?1 : t.coo_status==="declined"?2 : -1;
      if(i<rejAt) cls+=" done"; else if(i===rejAt) cls+=" rej";
    } else {
      if(i<idx) cls+=" done"; else if(i===idx) cls+=" cur";
    }
    const mark = cls.includes("done")?"✓":cls.includes("rej")?"✕":(i+1);
    html+=`<div class="step"><span class="${cls}">${mark}</span>${s[0]}</div>`;
    if(i<2){let lc="line";if((t.stage==="approved")||(i<idx))lc+=" done";html+=`<span class="${lc}"></span>`;}
  });
  html+='</div>';
  return html;
}

$("#loginBtn").onclick=async()=>{
  const email=$("#f_email").value.trim().toLowerCase();

  if(!email||!pass){setMsg("Enter your email and password.");return;}
  if(!email.endsWith("@karimjee.com")){setMsg("Only @karimjee.com company emails are permitted.");return;}
  $("#loginBtn").disabled=true;$("#loginBtn").textContent="Please wait…";

};

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){$("#login").classList.remove("hidden");$("#app").classList.add("hidden");return;}
  const {data:prof,error}=await sb.from("profiles").select("*").eq("id",session.user.id).single();

    <div class="grid3" style="margin-top:14px">
      <div><label>Data residency</label><select class="t_res"><option value="">Select…</option><option>Tanzania</option><option>USA</option><option>EU</option><option value="Other">Other</option></select></div>
      <div><label>Vendor trains on your data?</label><select class="t_train"><option value="">Select…</option><option value="no">No</option><option value="yes">Yes</option><option value="unknown">Unknown</option></select></div>
      <div><label>Training opt-out available?</label><select class="t_opt"><option value="">Select…</option><option value="yes">Yes</option><option value="no">No</option><option value="na">N/A</option></select></div>
    </div>
    <div style="margin-top:14px"><label>Integrations (check all that apply)</label>
      <div class="chips t_integs">
        ${INTEGS.map(c=>`<label class="chk"><input type="checkbox" value="${c[0]}" onchange="this.parentElement.classList.toggle('on',this.checked)">${c[1]}</label>`).join("")}
      </div>
    </div>
    <div class="grid2" style="margin-top:14px">
      <div><label>Target go-live date</label><input class="t_live" type="date"></div>
      <div style="display:flex;align-items:flex-end"><label class="chk" style="margin-bottom:0"><input type="checkbox" class="t_dpo" onchange="this.parentElement.classList.toggle('on',this.checked)">Data Protection Officer (DPO) has been notified</label></div>
    </div>`;
  $("#tools").appendChild(div);
}
async function submitRequest(){
  const blocks=[...document.querySelectorAll(".tool-block")];
  const tools=[];
  for(const b of blocks){
    const name=b.querySelector(".t_name").value.trim();
    const use=b.querySelector(".t_use").value.trim();
    if(!name){toast("Each tool needs a name.");return;}
    if(!use){toast(`Provide a business use case for "${name||'a tool'}".`);return;}
    tools.push({
      tool_name:name,
      vendor:b.querySelector(".t_vendor").value.trim()||null,
      url:b.querySelector(".t_url").value.trim()||null,
      business_use_case:use,
      users_desc:b.querySelector(".t_users").value.trim()||null,
      expected_count:b.querySelector(".t_count").value?parseInt(b.querySelector(".t_count").value):null,
      data_categories:[...b.querySelectorAll(".t_cats input:checked")].map(i=>i.value),
      data_residency:b.querySelector(".t_res").value||null,
      model_training:b.querySelector(".t_train").value||null,
      training_opt_out:b.querySelector(".t_opt").value||null,
      integrations:[...b.querySelectorAll(".t_integs input:checked")].map(i=>i.value),
      go_live_date:b.querySelector(".t_live").value||null,
      dpo_aware:b.querySelector(".t_dpo").checked
    });
  }
  if(!$("#r_bu").value){toast("Please select your business unit.");return;}
  $("#submitReq").disabled=true;$("#submitReq").textContent="Submitting…";
  const {data:req,error}=await sb.from("requests").insert({
    requester_id:ME.id,requester_email:ME.email,requester_name:ME.full_name,
    business_unit:$("#r_bu").value.trim()||null,notes:$("#r_notes").value.trim()||null
  }).select().single();
  if(error){toast("Error: "+error.message);$("#submitReq").disabled=false;$("#submitReq").textContent="Submit for Vetting";return;}
  const rows=tools.map(t=>({...t,request_id:req.id}));
  const {data:inserted,error:e2}=await sb.from("request_tools").insert(rows).select("id");
  if(e2){toast("Error saving tools: "+e2.message);$("#submitReq").disabled=false;$("#submitReq").textContent="Submit for Vetting";return;}
  // audit: submitted
  await sb.from("tool_audit").insert(inserted.map(r=>({tool_id:r.id,request_id:req.id,actor_email:ME.email,actor_role:ME.role,action:"submitted",from_stage:null,to_stage:"it_review"})));
  try{ await sb.functions.invoke("notify-approval",{body:{request_id:req.id}}); }catch(e){ console.warn("notify failed",e); }
  toast(`Submitted ${tools.length} tool${tools.length>1?"s":""} for vetting.`);
  go("mine");
}

/* ===================== MY REQUESTS ===================== */
async function renderMine(){
  $("#view").innerHTML=`<div class="page-head"><h2>My Requests</h2><p>Track each AI tool you have submitted through the approval pipeline.</p></div><div id="mineList"></div>`;
  const {data,error}=await sb.from("request_tools")
    .select("*, requests!inner(requester_id,business_unit,created_at,notes)")
    .eq("requests.requester_id",ME.id).order("created_at",{ascending:false});
  const wrap=$("#mineList");
  if(error){wrap.innerHTML=`<div class="empty">${esc(error.message)}</div>`;return;}
  if(!data.length){wrap.innerHTML=`<div class="card"><div class="empty">No requests yet. Use <b>New Request</b> to submit an AI tool for vetting.</div></div>`;return;}
  wrap.innerHTML=data.map(t=>toolCard(t,false)).join("");
}

/* ===================== REVIEW QUEUE ===================== */
async function renderQueue(){
  const stage=STAGE_FOR_ROLE[ME.role];
  const title={it_review:"Group IT Review",legal_review:"Group Legal & Compliance Review",coo_review:"Group COO — Final Decision"}[stage]||"Review Queue";
  $("#view").innerHTML=`<div class="page-head"><h2>${title}</h2><p>Approve or decline each AI tool. A reason is required to decline. Approved tools advance automatically to the next reviewer.</p></div><div id="qList"></div>`;
  const {data,error}=await sb.from("request_tools")
    .select("*, requests!inner(requester_name,requester_email,business_unit,created_at,notes)")
    .eq("stage",stage).order("created_at",{ascending:true});
  const wrap=$("#qList");
  if(error){wrap.innerHTML=`<div class="empty">${esc(error.message)}</div>`;return;}
  if(!data.length){wrap.innerHTML=`<div class="card"><div class="empty">🎉 Nothing awaiting your review right now.</div></div>`;return;}
  wrap.innerHTML=data.map(t=>toolCard(t,true)).join("");
}

/* ===================== REGISTRY ===================== */
async function renderRegistry(){
  $("#view").innerHTML=`<div class="page-head"><h2>AI Tool Registry</h2><p>Group-wide record of every AI tool request and its decision trail.</p></div>
    <div class="stat-row" id="stats"></div>
    <div class="card"><div class="card-b" style="overflow-x:auto"><table id="regTable"><thead><tr>
      <th>Tool</th><th>Requester / BU</th><th>Risk</th><th>Stage</th><th>IT</th><th>Legal</th><th>COO</th><th>Updated</th>
    </tr></thead><tbody></tbody></table></div></div>`;
  const {data,error}=await sb.from("request_tools")
    .select("*, requests(requester_name,requester_email,business_unit,created_at)")
    .order("updated_at",{ascending:false});
  if(error){$("#regTable").outerHTML=`<div class="empty">${esc(error.message)}</div>`;return;}
  const c={total:data.length,pending:0,approved:0,rejected:0};
  data.forEach(t=>{if(t.final_status==="approved")c.approved++;else if(t.final_status==="rejected")c.rejected++;else c.pending++;});
  $("#stats").innerHTML=`
    ${stat(c.total,"Total Tools")}${stat(c.pending,"In Pipeline")}${stat(c.approved,"Approved")}${stat(c.rejected,"Rejected")}`;
  const vd=v=>v==="approved"?'<span class="b ap">✓</span>':v==="declined"?'<span class="b rj">✕</span>':'<span class="meta">—</span>';
  $("#regTable").querySelector("tbody").innerHTML=data.map(t=>`
    <tr>
      <td><b>${esc(t.tool_name)}</b><div class="meta">${esc(t.vendor||"")}</div></td>
      <td>${esc(t.requests?.requester_name||t.requests?.requester_email||"")}<div class="meta">${esc(t.requests?.business_unit||"")}</div></td>
      <td>${riskBadge(t.risk_tier)}</td>
      <td>${badge(t.stage)}</td>
      <td>${vd(t.it_status)}</td><td>${vd(t.legal_status)}</td><td>${vd(t.coo_status)}</td>
      <td class="meta">${fmtDate(t.updated_at)}</td>
    </tr>`).join("");
}
function stat(n,l){return `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`;}

/* ===================== TOOL CARD ===================== */
function toolCard(t,actionable){
  const r=t.requests||{};
  const decisions=[];
  if(t.it_status!=="pending")decisions.push(noteRow("Group IT",t.it_status,t.it_reason,t.it_by,t.it_at));
  if(t.legal_status!=="pending")decisions.push(noteRow("Group Legal",t.legal_status,t.legal_reason,t.legal_by,t.legal_at));
  if(t.coo_status!=="pending")decisions.push(noteRow("Group COO",t.coo_status,t.coo_reason,t.coo_by,t.coo_at));
  return `<div class="card">
    <div class="card-h">
      <div><h3 style="font-size:16px">${esc(t.tool_name)} ${riskBadge(t.risk_tier)}</h3>
        <div class="meta">${esc(t.vendor||"—")}${t.url?` · <a href="${esc(t.url)}" target="_blank" rel="noopener">link</a>`:""}</div></div>
      ${badge(t.stage)}
    </div>
    <div class="card-b">
      ${pipeline(t)}
      <div class="kv">
        <div class="k">Requester</div><div>${esc(r.requester_name||r.requester_email||"")} ${r.business_unit?`· ${esc(r.business_unit)}`:""}</div>
        <div class="k">Use case</div><div>${esc(t.business_use_case||"—")}</div>
        <div class="k">Users</div><div>${esc(t.users_desc||"—")}${t.expected_count?` (${t.expected_count})`:""}</div>
        <div class="k">Data categories</div><div>${t.data_categories?.length?t.data_categories.map(catLabel).map(esc).join(", "):"—"}</div>
        <div class="k">Residency</div><div>${esc(t.data_residency||"—")}</div>
        <div class="k">Vendor training</div><div>${esc(t.model_training||"—")} · opt-out: ${esc(t.training_opt_out||"—")}</div>
        <div class="k">Integrations</div><div>${t.integrations?.length?t.integrations.map(esc).join(", "):"—"}</div>
        <div class="k">Go-live</div><div>${fmtDate(t.go_live_date)}</div>
        <div class="k">DPO notified</div><div>${t.dpo_aware?"Yes":"No"}</div>
      </div>
      ${decisions.join("")}
      ${actionable?actionUI(t):""}
    </div>
  </div>`;
}
function noteRow(who,status,reason,by,at){
  const ap=status==="approved";
  return `<div class="reason-note ${ap?'ap':'rj'}">
    <b>${who}: ${ap?'Approved':'Declined'}</b> ${by?`· ${esc(by)}`:""} ${at?`· ${fmtDateTime(at)}`:""}
    ${reason?`<div style="margin-top:3px">${esc(reason)}</div>`:""}</div>`;
}
function actionUI(t){
  return `<div class="reason-box">
    <label>Reason / notes (required to decline, optional to approve)</label>
    <textarea id="reason_${t.id}" placeholder="State the rationale for your decision…"></textarea>
    <div class="row-actions">
      <button class="btn-ok btn-sm" onclick="decide('${t.id}','approved')">✓ Approve &amp; advance</button>
      <button class="btn-bad btn-sm" onclick="decide('${t.id}','declined')">✕ Decline</button>
    </div></div>`;
}
async function decide(id,decision){
  const reason=($("#reason_"+id)?.value||"").trim();
  if(decision==="declined"&&!reason){toast("A reason is required to decline.");$("#reason_"+id)?.focus();return;}
  const {error}=await sb.rpc("decide_tool",{p_tool_id:id,p_decision:decision,p_reason:reason||null});
  if(error){toast("Error: "+error.message);return;}
  try{ await sb.functions.invoke("notify-approval",{body:{tool_id:id}}); }catch(e){ console.warn("notify failed",e); }
  toast(decision==="approved"?"Approved — advanced & next reviewer notified.":"Tool declined — requester notified.");
  refreshQueueBadge();
  renderQueue();
}
window.decide=decide;

/* ===================== START ===================== */
boot();
</script>
